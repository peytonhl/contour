<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is required for env(safe-area-inset-*) to work on iPhone notch/Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Contour — Rate. Review. Discover.</title>

    <!-- PWA / home screen -->
    <meta name="theme-color" content="#08080a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Contour" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Icons. Order matters: browsers pick the first format they understand.
         favicon.ico is the multi-resolution legacy fallback (16/32/48 inside).
         96x96 PNG covers modern browser-tab high-DPI rendering.
         apple-touch-icon is the 180x180 used by iOS "Add to Home Screen". -->
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Description for sharing -->
    <meta name="description" content="Rate, review, and discover music with friends. Half-star ratings, written reviews, side-by-side streaming comparison, and a personalized For You feed." />

    <!-- ── Boot reset ──
         Lives BEFORE the Google Fonts <link> on purpose. An earlier
         iteration kept this <style> block AFTER the external stylesheet,
         and on iOS WKWebView a frame painted with these rules NOT YET
         APPLIED while the external sheet was still loading — body
         showed its default 8px margin instead of margin:0. The wordmark
         then snapped from x=8,y=8 to its final centered position once
         the stylesheet finished. Putting the reset first eliminates that
         race. (Diagnosed 2026-05-17 via on-screen instrumentation; the
         debug overlay was removed in the same commit.) -->
    <style>
      html, body {
        margin: 0;
        background: #08080a;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
    </style>

    <!-- Instrument Serif — headings + wordmark. One face, regular + italic.
         Body type stays on the system stack. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" />

    <!-- ── Connection prefly ──
         Open TCP + TLS connections to every origin we'll hit during the
         first render, in parallel with the HTML parse. DNS, TLS, and TCP
         handshake all happen BEFORE the JS bundle finishes downloading,
         so when fetch() actually fires the connection is already warm.
         Each one shaves ~150-400ms off the first request to that origin
         on cellular / cold network.

         crossorigin is required on these so the browser uses the same
         credentials mode it will later use for the actual request. -->
    <link rel="preconnect" href="https://contour-production.up.railway.app" crossorigin />
    <link rel="dns-prefetch" href="https://contour-production.up.railway.app" />
    <!-- Spotify image CDN — all album covers without an Apple Music match -->
    <link rel="preconnect" href="https://i.scdn.co" crossorigin />
    <link rel="dns-prefetch" href="https://i.scdn.co" />
    <!-- Apple Music image CDN — covers with an Apple Music match (preferred when available) -->
    <link rel="preconnect" href="https://is1-ssl.mzstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://is1-ssl.mzstatic.com" />
    <!-- Spotify embed iframe — only for tracks without preview_url, but warm in case -->
    <link rel="dns-prefetch" href="https://open.spotify.com" />
  </head>
  <body>
    <!-- ── Boot splash ──
         Styles are INLINE on the element (not in a <style> block) because
         iOS WKWebView demonstrably painted at least one frame with
         class-based .boot-splash rules NOT YET APPLIED while the Google
         Fonts stylesheet was loading — the wordmark briefly rendered as
         a small top-left text line at x=8 y=8 before snapping to the
         flex-centered Georgia-52pt form. Inline element styles bypass
         CSSOM entirely; the element renders correctly on the very first
         frame regardless of any external stylesheet's load state.

         Layout notes:
           - position:fixed + inset:0 fills the WebView viewport, which
             with capacitor.config.json's contentInset:"always" is the
             safe-area rect on iOS — same rect the iOS LaunchScreen
             storyboard centers against, so the native → WebView handoff
             is pixel-aligned.
           - z-index:9999 keeps it above the React #root content while
             visible.
           - pointer-events:none lets taps fall through to React if it
             happened to mount before the splash hides.

         Font: Georgia, NOT Instrument Serif. Georgia is built into iOS/
         macOS/Windows/Android so it paints with no FOUT. The native iOS
         LaunchScreen.storyboard also renders "Contour" in Georgia 52pt
         (frontend/assets/ios/LaunchScreen.storyboard) — keep them in
         sync or the Capacitor splash → WebView handoff visibly shifts.

         The splash lives OUTSIDE #root so React's mount doesn't replace
         it. main.jsx sets display:none once Instrument Serif has loaded
         AND a 700ms brand-moment has elapsed (snap, not cross-fade —
         a fade exposed both this wordmark and the Layout-header
         wordmark at the same time in different positions, reading as
         the logo "moving"). -->
    <!-- The wordmark is anchored to the safe-area CENTER via CSS calc on
         env(safe-area-inset-*), NOT flex-centered inside an inset:0
         container. Why this matters: on iOS Capacitor relaxes
         contentInset:"always" partway through launch (most likely when
         SplashScreen.hide() resolves), and the WebView's bounds shift
         on screen. Anything anchored to viewport edges (flex-centered
         in inset:0, position:absolute relative to splash, etc.) moves
         with the WebView shift — that was the residual "splash twitch"
         the user reported through three prior fix attempts.

         env() values + 100vh BOTH change with contentInset state, but
         they change such that this calc resolves to the SAME absolute
         screen pixel:
           Inset:   env(top)=0,  100vh=759 → 379.5 in viewport → screen 438.5
           Full:    env(top)=59, 100vh=852 → 438.5 in viewport → screen 438.5
         The iOS LaunchScreen storyboard also centers against the
         safeArea layout guide, so the native → WebView handoff is
         pixel-aligned at this same point.

         translate(-50%, -50%) centers the wordmark around the calc'd
         top. white-space:nowrap prevents any wrapping if the wordmark's
         intrinsic width somehow exceeds 100% (defensive). -->
    <div id="boot-splash" aria-hidden="true"
         style="position:fixed; inset:0; background:#08080a; z-index:9999; pointer-events:none;">
      <div style="position:absolute; top:calc(env(safe-area-inset-top, 0px) + (100vh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)) / 2); left:50%; transform:translate(-50%, -50%); font-family:Georgia,'Times New Roman',Times,serif; font-size:52px; font-weight:400; letter-spacing:-0.01em; color:#fafafa; white-space:nowrap;">Contour</div>
    </div>
    <!-- ── Splash diagnostic (TEMPORARILY UNGATED) ──
         Sibling of #boot-splash (NOT a child) so it persists after the
         splash hides — captures wordmark-position changes during the
         splash phase AND keeps the log visible afterward so the user
         can screenshot it without racing the splash hide. Loud red box
         in the top-right; tap to dismiss. Will be re-gated on
         ?debug=splash in a follow-up commit once we've captured one
         diagnostic screenshot. -->
    <div id="splash-debug" style="position:fixed; top:env(safe-area-inset-top, 12px); right:8px; left:8px; z-index:99999; background:rgba(255,0,0,0.92); color:#fff; padding:8px 10px; border-radius:6px; font-family:'SF Mono',Menlo,monospace; font-size:11px; line-height:1.35; white-space:pre; pointer-events:auto;">splash diag — initializing…</div>
    <script>
      (function () {
        var dbg = document.getElementById('splash-debug');
        var splash = document.getElementById('boot-splash');
        var wm = splash && splash.querySelector('div');
        if (!dbg || !wm) return;
        // Tap to dismiss so the readout doesn't get in the way of using
        // the app once the screenshot is taken.
        dbg.addEventListener('click', function () { dbg.style.display = 'none'; });
        var start = performance.now();
        var lastTop = null;
        var changes = [];
        var splashHiddenAt = null;
        function tick() {
          var r = wm.getBoundingClientRect();
          var splashStyle = splash.style.display;
          if (splashStyle === 'none' && splashHiddenAt === null) {
            splashHiddenAt = performance.now() - start;
          }
          var now = (performance.now() - start).toFixed(0);
          var top = r.top.toFixed(1);
          var topNum = parseFloat(top);
          // Only track real position changes — getBoundingClientRect on a
          // display:none element returns 0/0, which would log a false
          // "change" the moment the splash hides. Filter that out.
          if (splashStyle !== 'none' && lastTop !== null && Math.abs(topNum - lastTop) > 1) {
            changes.push('t=' + now + 'ms ' + lastTop.toFixed(1) + '→' + top + ' vh=' + window.innerHeight);
          }
          if (splashStyle !== 'none') lastTop = topNum;
          dbg.textContent =
            'SPLASH DIAG (tap to close)\n' +
            't=' + now + 'ms  vh=' + window.innerHeight + '  sh=' + window.screen.height + '\n' +
            'wm.top=' + top + '  splash=' + (splashStyle || 'visible') + '\n' +
            'splash hid @ ' + (splashHiddenAt !== null ? splashHiddenAt.toFixed(0) + 'ms' : '—') + '\n' +
            'wordmark shifts: ' + changes.length + '\n' +
            (changes.length ? changes.slice(-5).join('\n') : '(no shifts detected)');
          if (performance.now() - start < 15000) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
