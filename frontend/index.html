<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is required for env(safe-area-inset-*) to work on iPhone notch/Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Contour — Rate. Review. Discover.</title>

    <!-- PWA / home screen -->
    <meta name="theme-color" content="#08080a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Contour" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Icons. Order matters: browsers pick the first format they understand.
         favicon.ico is the multi-resolution legacy fallback (16/32/48 inside).
         96x96 PNG covers modern browser-tab high-DPI rendering.
         apple-touch-icon is the 180x180 used by iOS "Add to Home Screen". -->
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Description for sharing -->
    <meta name="description" content="Rate, review, and discover music with friends. Half-star ratings, written reviews, side-by-side streaming comparison, and a personalized For You feed." />

    <!-- Instrument Serif — headings + wordmark. One face, regular + italic.
         Body type stays on the system stack. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" />

    <!-- ── Connection prefly ──
         Open TCP + TLS connections to every origin we'll hit during the
         first render, in parallel with the HTML parse. DNS, TLS, and TCP
         handshake all happen BEFORE the JS bundle finishes downloading,
         so when fetch() actually fires the connection is already warm.
         Each one shaves ~150-400ms off the first request to that origin
         on cellular / cold network.

         crossorigin is required on these so the browser uses the same
         credentials mode it will later use for the actual request. -->
    <link rel="preconnect" href="https://contour-production.up.railway.app" crossorigin />
    <link rel="dns-prefetch" href="https://contour-production.up.railway.app" />
    <!-- Spotify image CDN — all album covers without an Apple Music match -->
    <link rel="preconnect" href="https://i.scdn.co" crossorigin />
    <link rel="dns-prefetch" href="https://i.scdn.co" />
    <!-- Apple Music image CDN — covers with an Apple Music match (preferred when available) -->
    <link rel="preconnect" href="https://is1-ssl.mzstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://is1-ssl.mzstatic.com" />
    <!-- Spotify embed iframe — only for tracks without preview_url, but warm in case -->
    <link rel="dns-prefetch" href="https://open.spotify.com" />

    <!-- Boot styling. Inline (not via .css link) so the HTML parser paints the
         page-bg colour and the wordmark splash on the very first paint, before
         the JS bundle has even started downloading. Without this the user
         stares at a system-default white/black void for 1-2s on cold start
         (Capacitor WebView → fetch HTML → fetch JS bundle → parse → mount).

         The splash lives OUTSIDE #root so React doesn't replace it on mount —
         after the service worker landed, JS was loading from disk so fast
         that mount happened before the splash even painted. main.jsx flips
         the splash to display:none once Instrument Serif has loaded AND a
         700ms brand-moment has elapsed. Waiting for the font matters: the
         Layout header underneath uses Instrument Serif via Google Fonts
         display=swap, so dropping the splash before the font is in causes
         the wordmark to render in the Iowan Old Style fallback first and
         then glyph-swap a few hundred ms later — reading as the title
         "snapping around" right after the splash hides.

         IMPORTANT: no opacity transition here. An earlier iteration used a
         320ms cross-fade which produced a perceived "logo jumping around"
         glitch on mobile: at intermediate opacities both the centered
         boot-splash wordmark and the top-left Layout-header wordmark are
         visible at the same time, in different positions, in different
         fonts (Georgia vs Instrument Serif). The eye reads two
         simultaneous wordmarks-at-different-positions as the logo moving.
         A snap-off after a stable brand moment looks like a clean reveal
         instead of a cross-fade ghost.

         Font is Georgia (NOT Instrument Serif) on purpose. Georgia is built
         into iOS/macOS/Windows/Android, so it paints on the very first frame
         with no FOUT. The native iOS LaunchScreen.storyboard ALSO renders
         "Contour" in Georgia 52pt — keeping the two in sync means the
         Capacitor splash → WebView handoff doesn't visibly shift the
         wordmark's face, size, or baseline. The "real" brand serif
         (Instrument Serif) takes over once the React app mounts and shows
         actual page H1s. If you change the font here, change it in the
         storyboard at frontend/assets/ios/LaunchScreen.storyboard too. -->
    <style>
      html, body {
        margin: 0;
        background: #08080a;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .boot-splash {
        /* Simple inset:0 layout. The flex-centered wordmark lands at the
           center of the WebView's safe-area content (since
           contentInset:"always" makes inset:0 align with the safe area).
           The iOS LaunchScreen.storyboard ALSO centers against the
           safe-area layout guide (not the full view), so the storyboard
           wordmark and the HTML wordmark sit at the exact same screen
           coordinates — invisible handoff.
           Earlier iteration tried negative env() offsets to compensate
           for a storyboard that centered against the full view; switching
           the storyboard to safeArea instead is cleaner because it
           doesn't depend on env() resolution timing during boot. */
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #08080a;
        z-index: 9999;
        pointer-events: none;
      }
      .boot-splash__wordmark {
        font-family: Georgia, "Times New Roman", Times, serif;
        font-size: 52px;
        font-weight: 400;
        letter-spacing: -0.01em;
        color: #fafafa;
      }
    </style>
  </head>
  <body>
    <!-- Wordmark splash. Lives outside #root so React's mount doesn't replace
         it; main.jsx adds the --done class after the app renders, fading it
         out and leaving the app visible underneath. -->
    <div id="boot-splash" class="boot-splash" aria-hidden="true">
      <div class="boot-splash__wordmark">Contour</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
