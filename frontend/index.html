<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is required for env(safe-area-inset-*) to work on iPhone notch/Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Contour — Rate. Review. Discover.</title>

    <!-- PWA / home screen -->
    <meta name="theme-color" content="#08080a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Contour" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Icons. Order matters: browsers pick the first format they understand.
         favicon.ico is the multi-resolution legacy fallback (16/32/48 inside).
         96x96 PNG covers modern browser-tab high-DPI rendering.
         apple-touch-icon is the 180x180 used by iOS "Add to Home Screen". -->
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Description for sharing -->
    <meta name="description" content="Rate, review, and discover music with friends. Half-star ratings, written reviews, side-by-side streaming comparison, and a personalized For You feed." />

    <!-- ── Boot reset ──
         Lives BEFORE the Google Fonts <link> on purpose. An earlier
         iteration kept this <style> block AFTER the external stylesheet,
         and on iOS WKWebView a frame painted with these rules NOT YET
         APPLIED while the external sheet was still loading — body
         showed its default 8px margin instead of margin:0. The wordmark
         then snapped from x=8,y=8 to its final centered position once
         the stylesheet finished. Putting the reset first eliminates that
         race. (Diagnosed 2026-05-17 via on-screen instrumentation; the
         debug overlay was removed in the same commit.) -->
    <style>
      html, body {
        margin: 0;
        background: #08080a;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
    </style>

    <!-- Instrument Serif — headings + wordmark. One face, regular + italic.
         Body type stays on the system stack. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" />

    <!-- ── Connection prefly ──
         Open TCP + TLS connections to every origin we'll hit during the
         first render, in parallel with the HTML parse. DNS, TLS, and TCP
         handshake all happen BEFORE the JS bundle finishes downloading,
         so when fetch() actually fires the connection is already warm.
         Each one shaves ~150-400ms off the first request to that origin
         on cellular / cold network.

         crossorigin is required on these so the browser uses the same
         credentials mode it will later use for the actual request. -->
    <!-- Backend host comes from VITE_API_URL via Vite's %VITE_*% HTML
         substitution. At `vite build` time, .env.production sets this to
         the Railway URL; in dev the value is empty (Vite proxy handles
         /api/*), which makes the preconnect a no-op — harmless. Keeping
         this in sync with services/api.js's BASE without duplicating the
         literal URL across files. -->
    <link rel="preconnect" href="%VITE_API_URL%" crossorigin />
    <link rel="dns-prefetch" href="%VITE_API_URL%" />
    <!-- Spotify image CDN — all album covers without an Apple Music match -->
    <link rel="preconnect" href="https://i.scdn.co" crossorigin />
    <link rel="dns-prefetch" href="https://i.scdn.co" />
    <!-- Apple Music image CDN — covers with an Apple Music match (preferred when available) -->
    <link rel="preconnect" href="https://is1-ssl.mzstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://is1-ssl.mzstatic.com" />
    <!-- Spotify embed iframe — only for tracks without preview_url, but warm in case -->
    <link rel="dns-prefetch" href="https://open.spotify.com" />
  </head>
  <body>
    <!-- ── Boot splash ──
         Styles are INLINE on the element (not in a <style> block) because
         iOS WKWebView demonstrably painted at least one frame with
         class-based .boot-splash rules NOT YET APPLIED while the Google
         Fonts stylesheet was loading — the wordmark briefly rendered as
         a small top-left text line at x=8 y=8 before snapping to the
         flex-centered Georgia-52pt form. Inline element styles bypass
         CSSOM entirely; the element renders correctly on the very first
         frame regardless of any external stylesheet's load state.

         Layout notes:
           - position:fixed + inset:0 fills the WebView viewport, which
             with capacitor.config.json's contentInset:"always" is the
             safe-area rect on iOS — same rect the iOS LaunchScreen
             storyboard centers against, so the native → WebView handoff
             is pixel-aligned.
           - z-index:9999 keeps it above the React #root content while
             visible.
           - pointer-events:none lets taps fall through to React if it
             happened to mount before the splash hides.

         Font: Georgia, NOT Instrument Serif. Georgia is built into iOS/
         macOS/Windows/Android so it paints with no FOUT. The native iOS
         LaunchScreen.storyboard also renders "Contour" in Georgia 52pt
         (frontend/assets/ios/LaunchScreen.storyboard) — keep them in
         sync or the Capacitor splash → WebView handoff visibly shifts.

         The splash lives OUTSIDE #root so React's mount doesn't replace
         it. main.jsx sets display:none once Instrument Serif has loaded
         AND a 700ms brand-moment has elapsed (snap, not cross-fade —
         a fade exposed both this wordmark and the Layout-header
         wordmark at the same time in different positions, reading as
         the logo "moving"). -->
    <!-- The wordmark is anchored to the safe-area CENTER via CSS calc on
         env(safe-area-inset-*), NOT flex-centered inside an inset:0
         container. Why this matters: on iOS Capacitor relaxes
         contentInset:"always" partway through launch (most likely when
         SplashScreen.hide() resolves), and the WebView's bounds shift
         on screen. Anything anchored to viewport edges (flex-centered
         in inset:0, position:absolute relative to splash, etc.) moves
         with the WebView shift — that was the residual "splash twitch"
         the user reported through three prior fix attempts.

         env() values + 100vh BOTH change with contentInset state, but
         they change such that this calc resolves to the SAME absolute
         screen pixel:
           Inset:   env(top)=0,  100vh=759 → 379.5 in viewport → screen 438.5
           Full:    env(top)=59, 100vh=852 → 438.5 in viewport → screen 438.5
         The iOS LaunchScreen storyboard also centers against the
         safeArea layout guide, so the native → WebView handoff is
         pixel-aligned at this same point.

         translate(-50%, -50%) centers the wordmark around the calc'd
         top. white-space:nowrap prevents any wrapping if the wordmark's
         intrinsic width somehow exceeds 100% (defensive). -->
    <div id="boot-splash" aria-hidden="true"
         style="position:fixed; inset:0; background:#08080a; z-index:9999; pointer-events:none;">
      <!-- Geometric vertical center (top:50% on a position:fixed; inset:0
           parent resolves to 50% of vh). We previously used an env()-aware
           calc to "stay in the safe area" across iOS's contentInset relax:
              calc(env(top) + (100vh - env(top) - env(bottom)) / 2)
           Diagnostic data (2026-05-19) showed that on this WebKit version,
           env() updates WITHOUT a corresponding 100vh update — so the calc
           drifted by ~6.5px at t=79ms (when Capacitor relaxed
           contentInset:"always" via SplashScreen.hide). The shift was
           visible as "the logo jumps once" before the app appeared.
           Geometric center skips env() entirely; vh was stable in the
           data, so the position is stable too. Trade-off: ~6.5px higher
           than the safe-area-aware position on notched iPhones; sub-frame
           mismatch with the LaunchScreen storyboard at t=0, but
           imperceptible compared to the previous visible mid-splash shift. -->
      <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-family:Georgia,'Times New Roman',Times,serif; font-size:52px; font-weight:400; letter-spacing:-0.01em; color:#fafafa; white-space:nowrap;">Contour</div>
      <!-- Gated splash diagnostic — kept in tree (not deleted) so future
           positioning bugs have a tool to reach for. Renders only when
           ?debug=splash is in the URL. -->
      <div id="splash-debug" style="position:absolute; bottom:80px; left:0; right:0; text-align:center; font-family:'SF Mono',Menlo,monospace; font-size:11px; line-height:1.4; color:#888; white-space:pre; display:none;">starting…</div>
    </div>
    <!-- env() probe elements — used by the gated diagnostic to read the
         actual env(safe-area-inset-*) values at each tick. Kept in tree
         (tiny zero-size divs) so the diagnostic doesn't need to inject
         them on demand. -->
    <div id="env-probe-top" style="position:fixed; top:env(safe-area-inset-top, 0px); width:0; height:0; pointer-events:none;"></div>
    <div id="env-probe-bottom" style="position:fixed; bottom:env(safe-area-inset-bottom, 0px); width:0; height:0; pointer-events:none;"></div>
    <script>
      // ── Pre-position the wordmark to match the native LaunchScreen ──
      // The previous geometric-center fix (top:50%) eliminated the within-
      // HTML drift caused by env() updates, but left a residual ~6.5px
      // upward shift at the moment the native iOS LaunchScreen storyboard
      // hands off to the HTML splash. The storyboard centers against the
      // safeArea layout guide (≈ envT + (h - envT - envB) / 2), while
      // top:50% centers geometrically — those differ by env()-half on
      // notched iPhones.
      //
      // We can't use CSS env() to compensate because Capacitor's
      // contentInset="always" makes env() return 0 until SplashScreen.hide()
      // relaxes it ~80ms later — too late, the handoff already happened.
      // Instead, JS reads vh at parse time and applies a heuristic: vh > 700
      // means a notched iPhone (12+), so override top to the LaunchScreen-
      // matching safeArea center using typical insets (47/34). Older
      // non-notched devices (iPhone SE, vh ≤ 700) keep top:50% which
      // matches THEIR storyboard (env values are 0 for them too).
      //
      // Runs synchronously at parse time, BEFORE the splash gets a chance
      // to paint, so frame 1 is correct.
      (function () {
        var wm = document.querySelector('#boot-splash > div');
        if (!wm) return;
        var vh = window.innerHeight;
        if (vh > 700) {
          // Typical modern iPhone safe-area insets: top 47, bottom 34.
          // Matches the LaunchScreen.storyboard safeArea center for these
          // devices; sub-pixel on older notched models with slightly
          // different insets, imperceptible.
          wm.style.top = (47 + (vh - 47 - 34) / 2) + 'px';
        }
      })();

      // ── Gated splash diagnostic ──
      // Renders only when ?debug=splash is in the URL. Captures wordmark
      // position, dimensions, and env() values across the splash phase
      // so future positioning bugs can be triaged in one screenshot.
      (function () {
        if (!/[?&]debug=splash(\b|$)/.test(location.search)) return;
        var dbg = document.getElementById('splash-debug');
        var splash = document.getElementById('boot-splash');
        var wm = splash && splash.querySelector('div');
        var probeT = document.getElementById('env-probe-top');
        var probeB = document.getElementById('env-probe-bottom');
        if (!dbg || !wm) return;
        dbg.style.display = 'block';
        var start = performance.now();
        var last = null;
        var changes = [];
        function readEnv() {
          var t = probeT ? parseFloat(getComputedStyle(probeT).top) || 0 : 0;
          var bRect = probeB ? probeB.getBoundingClientRect() : null;
          var b = bRect ? window.innerHeight - bRect.top : 0;
          return { t: t, b: b };
        }
        function tick() {
          var r = wm.getBoundingClientRect();
          var now = (performance.now() - start).toFixed(0);
          var env = readEnv();
          var snap = {
            t: parseFloat(r.top.toFixed(1)),
            w: parseFloat(r.width.toFixed(1)),
            h: parseFloat(r.height.toFixed(1)),
            vh: window.innerHeight,
            envT: env.t.toFixed(1),
            envB: env.b.toFixed(1),
          };
          if (last !== null) {
            var diffs = [];
            if (Math.abs(snap.t - last.t) > 0.5) diffs.push('top:' + last.t + '→' + snap.t);
            if (Math.abs(snap.w - last.w) > 0.5) diffs.push('w:' + last.w + '→' + snap.w);
            if (Math.abs(snap.h - last.h) > 0.5) diffs.push('h:' + last.h + '→' + snap.h);
            if (snap.vh !== last.vh) diffs.push('vh:' + last.vh + '→' + snap.vh);
            if (snap.envT !== last.envT) diffs.push('envT:' + last.envT + '→' + snap.envT);
            if (snap.envB !== last.envB) diffs.push('envB:' + last.envB + '→' + snap.envB);
            if (diffs.length) changes.push('t=' + now + 'ms ' + diffs.join(' | '));
          }
          last = snap;
          dbg.textContent =
            't=' + now + 'ms\n' +
            'wm top=' + snap.t + ' w=' + snap.w + ' h=' + snap.h + '\n' +
            'vh=' + snap.vh + ' envT=' + snap.envT + ' envB=' + snap.envB + '\n' +
            'shifts: ' + changes.length + '\n' +
            changes.slice(-4).join('\n');
          if (performance.now() - start < 5000) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
