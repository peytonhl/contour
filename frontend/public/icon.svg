<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0d0d0f"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Rising trajectory curve — represents a stream contour line -->
  <path
    d="M 18 76 C 28 76 34 62 42 52 C 50 42 58 30 82 22"
    stroke="url(#grad)"
    stroke-width="7"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Anchor dots -->
  <circle cx="18" cy="76" r="5.5" fill="#a78bfa"/>
  <circle cx="82" cy="22" r="5.5" fill="#34d399"/>
  <!-- Mid inflection dot -->
  <circle cx="50" cy="47" r="3.5" fill="url(#grad)" opacity="0.7"/>
</svg>
