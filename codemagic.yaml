# Codemagic CI workflow for Contour
#
# Builds the iOS app from frontend/ (Vite-built React wrapped by Capacitor).
# Android builds happen locally on the dev machine; Codemagic is iOS-only
# because that's the platform that actually requires macOS to build.
#
# Required Codemagic configuration (one-time setup, see OPERATIONS.md):
#   1. App Store Connect API integration — add under "Teams" → "Integrations".
#      Name it 'app-store-connect' so the publishing block below picks it up.
#      Needs an App Store Connect API key (.p8 + Key ID + Issuer ID), generated
#      at appstoreconnect.apple.com → Users and Access → Keys.
#   2. Code signing — Codemagic uses the same App Store Connect API key to
#      auto-fetch your iOS Distribution certificate and provisioning profile,
#      so no .p12 / .mobileprovision upload is needed.
#   3. Environment variables (Codemagic UI → app settings → Environment vars,
#      add to a group called 'contour-prod' so the import below works):
#        VITE_POSTHOG_KEY        (secret) — frontend analytics
#        VITE_APPLE_CLIENT_ID    — Sign-in-with-Apple Services ID
#        CERTIFICATE_PRIVATE_KEY (secret) — 2048-bit RSA PEM private key.
#                                  Codemagic uses this to register an iOS
#                                  Distribution cert with App Store Connect
#                                  on first build, then reuses on every
#                                  build after. Generate locally with:
#                                    ssh-keygen -t rsa -b 2048 -m PEM \
#                                      -f $env:USERPROFILE\Secrets\contour_signing_key \
#                                      -N '""'
#                                  Paste the PEM contents (BEGIN/END lines
#                                  included) into Codemagic as a SECURE var.
#                                  BACK THIS UP — losing it means you can
#                                  never update the iOS app.
#      VITE_API_URL is already baked into the build via frontend/.env.production,
#      no Codemagic config needed for that one.

workflows:
  ios-release:
    name: iOS · Release build
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      # Name on the right MUST match the integration name configured in
      # Codemagic UI → Apple Developer Portal integration (or App Store
      # Connect API key, same key). Currently 'Codemagic CI' — default name
      # Codemagic assigned when the .p8 was uploaded.
      app_store_connect: "Codemagic CI"

    environment:
      groups:
        - contour-prod        # see comment above; create in Codemagic UI
      vars:
        # Capacitor 8 uses Swift Package Manager — no .xcworkspace, build
        # straight against the .xcodeproj.
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.peytonhl.contour"
        APP_STORE_APPLE_ID: "6768775634"   # Contour Music — App Store Connect record
      node: latest
      xcode: latest

    triggering:
      # Don't auto-build every push — iOS releases are deliberate. Trigger
      # manually from the Codemagic UI or via a git tag like 'ios-v0.1.0'.
      events:
        - tag
      tag_patterns:
        - pattern: 'ios-v*'
          include: true

    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.npm
        - frontend/node_modules

    scripts:
      - name: Install npm dependencies
        script: |
          set -ex
          cd frontend
          # npm ci is strict; fall back to npm install if the lockfile drifts
          # so we don't lose the whole build to a transient lockfile mismatch.
          npm ci || npm install

      - name: Build the web frontend
        script: |
          set -ex
          cd frontend
          npm run build

      - name: Add iOS platform (first time only)
        script: |
          set -ex
          cd frontend
          if [ ! -d "ios" ]; then
            echo ">>> iOS platform not yet scaffolded — running 'npx cap add ios'"
            npx cap add ios
          else
            echo ">>> iOS platform already exists, skipping cap add"
          fi
          echo ">>> Confirming iOS scaffold layout (Capacitor 8 uses SPM):"
          ls -la ios/ || (echo "FATAL: ios/ directory missing after cap add" && exit 1)
          ls -la ios/App/ || (echo "FATAL: ios/App/ directory missing" && exit 1)
          test -d ios/App/App.xcodeproj || (echo "FATAL: App.xcodeproj missing" && exit 1)

      - name: Sync web assets into iOS
        script: |
          set -ex
          cd frontend
          npx cap sync ios

      - name: Generate iOS app icon + splash from master assets
        script: |
          set -ex
          cd frontend
          # `@capacitor/assets generate` reads ./assets/icon.png +
          # icon-only.png (and optionally splash.png, splash-dark.png),
          # then writes every required iOS variant straight into
          # ios/App/App/Assets.xcassets/AppIcon.appiconset/. Same tool
          # handles Android adaptive icons when we wire that pipeline up.
          #
          # The `--iconBackgroundColor` flags only matter for icon
          # variants that need a fill behind a transparent foreground
          # (e.g. Android adaptive). Our icon-only.png is full-bleed
          # opaque so these are effectively a fallback for any Android
          # density that wants the solid background.
          npx capacitor-assets generate --ios \
            --iconBackgroundColor "#08080a" \
            --iconBackgroundColorDark "#08080a" \
            --splashBackgroundColor "#08080a" \
            --splashBackgroundColorDark "#08080a"

          echo ">>> Confirming icon variants landed in AppIcon.appiconset:"
          ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/ || \
            (echo "FATAL: AppIcon.appiconset missing — capacitor-assets failed silently" && exit 1)

      - name: Override LaunchScreen.storyboard with Contour wordmark
        script: |
          set -ex
          # `capacitor-assets generate` produces a launch screen with
          # icon-only.png centered on a dark bg. That reads as a black
          # screen to users because the icon contrast on the bg is low —
          # they perceive ~1-2s of black before the WebView paints the
          # JS-side splash. Overriding with a hand-crafted storyboard
          # that shows the "Contour" wordmark in solid white on the same
          # bg gives an immediately recognisable native splash, matching
          # the web boot splash visually so the transition is continuous.
          SRC="frontend/assets/ios/LaunchScreen.storyboard"
          DEST="frontend/ios/App/App/Base.lproj/LaunchScreen.storyboard"
          if [ ! -f "$SRC" ]; then
            echo "FATAL: $SRC missing — cannot override LaunchScreen.storyboard" >&2
            exit 1
          fi
          if [ ! -f "$DEST" ]; then
            echo "FATAL: $DEST missing — capacitor-assets generate did not create the expected storyboard path" >&2
            exit 1
          fi
          cp "$SRC" "$DEST"
          echo ">>> Replaced auto-generated LaunchScreen.storyboard with branded version."

      - name: Set Info.plist values
        script: |
          set -ex
          INFO_PLIST="frontend/ios/App/App/Info.plist"

          # ITSAppUsesNonExemptEncryption=NO sidesteps the export-compliance
          # question on every TestFlight upload (we only use HTTPS, no
          # proprietary crypto).
          plutil -replace ITSAppUsesNonExemptEncryption -bool NO "$INFO_PLIST"

          # Register the `contour` URL scheme so iOS knows our app handles
          # contour://... links. This is what completes the Google OAuth flow
          # on native: backend redirects to `contour://auth?token=...` after
          # external Safari sign-in, iOS wakes the app up, and the WebView
          # gets the URL via Capacitor's appUrlOpen event.
          #
          # CFBundleURLTypes is an array of dicts; we replace the whole key
          # (Capacitor doesn't generate one by default).
          plutil -replace CFBundleURLTypes -json '[
            {
              "CFBundleURLName": "com.peytonhl.contour",
              "CFBundleTypeRole": "Editor",
              "CFBundleURLSchemes": ["contour"]
            }
          ]' "$INFO_PLIST"

          # NSPhotoLibraryAddUsageDescription — required for the Save Image
          # action in CardPreviewModal (saveCardNative in utils/share.js).
          # We use the ADD variant rather than NSPhotoLibraryUsageDescription
          # so the system prompts for write-only permission, not full
          # library access — we only ever write the OG card PNG, never read
          # the user's photos.
          plutil -replace NSPhotoLibraryAddUsageDescription \
            -string "Save your shareable Contour card to Photos." \
            "$INFO_PLIST"

          echo ">>> Info.plist values now set:"
          plutil -p "$INFO_PLIST" | grep -E 'ITSAppUsesNonExemptEncryption|CFBundleURLTypes|CFBundleURLSchemes|NSPhotoLibraryAddUsageDescription' || true

      - name: Set the build number
        script: |
          set -ex
          # Bundle versions (CFBundleVersion) must be strictly monotonic for
          # every IPA we upload to App Store Connect. Re-using a version
          # gets rejected with ENTITY_ERROR.ATTRIBUTE.INVALID.DUPLICATE.
          #
          # `get-latest-build-number` (no suffix) checks ALL tracks —
          # App Store production + TestFlight + processing. The "app-store"
          # and "testflight" suffixed variants only check one track each,
          # which causes false-zero returns when builds exist on the other
          # track. The unsuffixed variant is the right one for monotonicity.
          LATEST_BUILD_NUMBER=$(
            app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID" \
              || echo 0
          )
          # Normalize: strip whitespace, fall back to 0 if empty.
          LATEST_BUILD_NUMBER=$(echo "$LATEST_BUILD_NUMBER" | tr -d '[:space:]')
          LATEST_BUILD_NUMBER=${LATEST_BUILD_NUMBER:-0}
          NEW_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          echo ">>> Latest CFBundleVersion on App Store Connect: $LATEST_BUILD_NUMBER"
          echo ">>> New CFBundleVersion for this build:          $NEW_BUILD_NUMBER"
          cd frontend/ios/App
          agvtool new-version -all "$NEW_BUILD_NUMBER"
          echo ">>> Version actually applied by agvtool:"
          agvtool what-version -terse

      - name: Set up code signing
        script: |
          set -ex
          # Standard Codemagic iOS signing sequence. Relies on env var
          # CERTIFICATE_PRIVATE_KEY being set in the Codemagic UI (group
          # contour-prod) — that's a 2048-bit RSA PEM private key that
          # Codemagic uses to register a Distribution cert with App Store
          # Connect on first build, then reuses on every subsequent build.
          # Setup instructions: TODO_PEYTON.md → "Codemagic signing key".
          #
          # Without CERTIFICATE_PRIVATE_KEY set, fetch-signing-files dies
          # with "Cannot save Signing Certificates without certificate
          # private key" — that's the canary that the env var is missing.
          keychain initialize

          # Fetch (or create, if missing) the iOS Distribution certificate
          # AND the App Store provisioning profile for the bundle ID. The
          # cert is bound to CERTIFICATE_PRIVATE_KEY; the profile is bound
          # to the cert. Idempotent across builds.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

          # Import the cert into the build keychain so xcodebuild can sign.
          keychain add-certificates

          # Wire the profile into App.xcodeproj (sets DEVELOPMENT_TEAM,
          # PROVISIONING_PROFILE_SPECIFIER, CODE_SIGN_IDENTITY on the target).
          xcode-project use-profiles

      - name: Build the IPA
        script: |
          set -ex
          cd frontend/ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      # Drop into a notification channel for build outcomes; remove if you
      # don't want emails.
      email:
        recipients:
          - peyton2117@gmail.com
        notify:
          success: true
          failure: true

      # Auto-upload to TestFlight on every successful tag build. Disable by
      # setting submit_to_testflight: false if you'd rather upload manually
      # via the Codemagic UI ("Download artifacts" → upload through Transporter).
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Add specific tester groups here once you've set them up in App Store Connect.
        # beta_groups:
        #   - "Internal Testers"
