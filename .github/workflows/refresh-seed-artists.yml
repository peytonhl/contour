name: refresh-seed-artists

# Monthly re-derivation of the onboarding artist picker roster
# (frontend/src/data/seedArtists.js) from the current Apple genre charts.
#
# Flow each run:
#   1. Regenerate the roster (scripts/refresh-seed-artists.mjs) + a quality
#      report (_quality.json). No change → stop.
#   2. Gate on a real frontend build (the regenerated file must compile).
#   3. Open a PR, assign it to Peyton (→ GitHub emails him), label it.
#   4. Merge decision:
#        • SCHEDULED run + autoMergeEligible (real artists, all photos valid,
#          scenes balanced) → squash-merge to master (auto-deploys).
#        • MANUAL run (workflow_dispatch) → always left open for review, even
#          if eligible — so a hand-triggered test never deploys unsupervised.
#        • not eligible → left open for review.
#
# Quality gate is about whether the artists are REAL (confident Spotify match +
# photo), NOT how much the roster changed — a big monthly shake-up auto-merges
# fine as long as every artist is legit.

on:
  schedule:
    - cron: "0 9 1 * *" # 09:00 UTC, 1st of each month
  workflow_dispatch: {} # manual runs from the Actions tab (review-only)

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Re-derive roster from Apple genre charts
        run: node scripts/refresh-seed-artists.mjs

      - name: Detect whether the roster changed
        id: changed
        run: |
          if [ -f .seed-refresh-nochange ] || git diff --quiet -- frontend/src/data/seedArtists.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No roster change this month."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Build gate — the regenerated data file must compile in a real build.
      - name: Install frontend deps
        if: steps.changed.outputs.changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build frontend (gate)
        if: steps.changed.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build

      - name: Open PR, then auto-merge (scheduled + eligible only)
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          MONTH=$(date -u +%Y-%m)
          BRANCH="chore/refresh-seed-artists-${MONTH}"

          # Pull merge-decision values out of the quality report up front.
          ELIGIBLE=$(node -e "console.log(require('./_quality.json').autoMergeEligible)")
          CHURN=$(node -e "console.log(require('./_quality.json').churn)")
          ADDED=$(node -e "console.log((require('./_quality.json').added||[]).join(', ')||'(none)')")
          REMOVED=$(node -e "console.log((require('./_quality.json').removed||[]).join(', ')||'(none)')")
          KEPT=$(node -e "console.log(require('./_quality.json').keptCount)")

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add frontend/src/data/seedArtists.js
          git commit -m "Onboarding: monthly seed-artist roster refresh (${MONTH})"
          git push -f origin "$BRANCH"

          printf '%s\n' \
            "@peytonhl — monthly onboarding seed-artist roster refresh is ready for review." \
            "" \
            "Automated re-derivation from the current Apple genre charts. Every artist was kept only if it confidently matched a real Spotify artist with a photo (no first-hit fallback). The frontend build passed on this roster." \
            "" \
            "- Kept: ${KEPT}" \
            "- Added: ${ADDED}" \
            "- Removed: ${REMOVED}" \
            "- Churn: ${CHURN} (informational — not a merge gate)" \
            "- Quality eligible: ${ELIGIBLE}" \
            "" \
            "Scheduled runs auto-merge when quality-eligible (deploys the new picker). Manual runs are always left open for review. See scripts/refresh-seed-artists.mjs." \
            > pr_body.md

          # Create the PR first with only what pull-requests:write guarantees.
          # Assignee + label are attached afterward as best-effort so a
          # permissions hiccup on those can never fail the job or block the
          # auto-merge. The body @mentions Peyton as a notification fallback.
          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create \
              --base master --head "$BRANCH" \
              --title "Onboarding: monthly seed-artist roster refresh (${MONTH})" \
              --body-file pr_body.md
          else
            echo "PR for $BRANCH already exists — branch updated."
          fi
          rm -f pr_body.md

          gh label create seed-refresh --color BFD4F2 --description "Monthly onboarding seed-artist refresh" 2>/dev/null || true
          gh pr edit "$BRANCH" --add-assignee peytonhl || echo "WARN: assign failed (PR open + @mention sent)"
          gh pr edit "$BRANCH" --add-label seed-refresh || echo "WARN: label failed"

          if [ "$ELIGIBLE" = "true" ] && [ "$EVENT_NAME" = "schedule" ]; then
            echo "Scheduled + quality-eligible — auto-merging."
            sleep 8 # let GitHub compute mergeability before we ask to merge
            gh pr merge "$BRANCH" --squash --delete-branch
          else
            echo "Left open for review (event=${EVENT_NAME}, eligible=${ELIGIBLE}). Peyton assigned + emailed."
          fi
